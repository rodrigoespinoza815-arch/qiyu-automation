<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>跳一跳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#E8F5E9;font-family:-apple-system,sans-serif;touch-action:none;user-select:none}
canvas{display:block}
.score-el{position:fixed;top:50px;left:50%;transform:translateX(-50%);font-size:48px;font-weight:bold;color:#333;z-index:10;pointer-events:none}
.best-el{position:fixed;top:105px;left:50%;transform:translateX(-50%);font-size:14px;color:#999;z-index:10;pointer-events:none}
#startScreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#667eea,#764ba2);z-index:100;transition:opacity .4s}
#startScreen.hide{opacity:0;pointer-events:none}
#startScreen h1{font-size:48px;color:#fff;margin-bottom:12px}
#startScreen p{color:rgba(255,255,255,.7);font-size:15px;margin-bottom:36px}
#startBtn{background:#fff;color:#764ba2;border:none;padding:13px 48px;font-size:20px;font-weight:bold;border-radius:26px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2)}
#startBtn:active{transform:scale(.96)}
.tips{margin-top:28px;color:rgba(255,255,255,.45);font-size:12px;line-height:1.7}
#gameOver{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.5);z-index:100}
#gameOver.show{display:flex}
.over-card{background:#fff;border-radius:16px;padding:28px 32px;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.over-card h2{font-size:20px;color:#333;margin-bottom:10px}
.over-score{font-size:48px;font-weight:bold;color:#764ba2;margin:8px 0}
.over-best{font-size:13px;color:#999;margin-bottom:18px}
#restartBtn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:11px 36px;font-size:16px;font-weight:bold;border-radius:20px;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="score-el" id="scoreEl">0</div>
<div class="best-el" id="bestEl"></div>

<div id="startScreen">
  <h1>🎯 跳一跳</h1>
  <p>按住蓄力，松开跳跃</p>
  <button id="startBtn">开始游戏</button>
  <div class="tips">🖱️ 按住鼠标蓄力<br>📱 按住屏幕蓄力<br>💡 蓄力越久跳得越远</div>
</div>

<div id="gameOver">
  <div class="over-card">
    <h2>游戏结束 😢</h2>
    <div class="over-score" id="finalScore">0</div>
    <div class="over-best" id="finalBest">最高纪录：0</div>
    <button id="restartBtn">再来一局</button>
  </div>
</div>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
let plats=[],score=0,best=+localStorage.getItem('jb')||0;
let px,py,pw=28,ph=28;
let charging=false,chargeStart=0;
let jumping=false,jumpSX,jumpSY,jumpEX,jumpEY,jumpT=0,jumpArcH=0;
let camX=0,camY=0;
let running=false;

const MAX_CHARGE=2000;
const COLS=['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7','#DDA0DD','#F8B500','#6C5CE7','#A8E6CF','#FF8A80'];

function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();onresize=resize;

function addPlat(x,y,w,h){plats.push({x,y,w:w||40+Math.random()*35,h:h||14+Math.random()*10,color:COLS[Math.random()*COLS.length|0],scored:false})}

function init(){
  plats=[];
  const sx=W*.22,sy=H*.55;
  addPlat(sx,sy,60,18);
  for(let i=0;i<7;i++){
    const last=plats[plats.length-1];
    const dx=60+Math.random()*110;
    const dy=(Math.random()-.5)*90;
    const ny=Math.max(H*.28,Math.min(H*.72,last.y+dy));
    addPlat(last.x+dx,ny);
  }
  const fp=plats[0];
  px=fp.x+fp.w/2-pw/2;
  py=fp.y-ph;
  score=0;camX=0;camY=0;
  charging=false;jumping=false;jumpT=0;
  document.getElementById('scoreEl').textContent='0';
  document.getElementById('bestEl').textContent=best>0?'🏆 '+best:'';
}

function draw(){
  X.clearRect(0,0,W,H);
  // bg
  const bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#87CEEB');bg.addColorStop(.6,'#E0F6FF');bg.addColorStop(1,'#F5F5F5');
  X.fillStyle=bg;X.fillRect(0,0,W,H);
  // clouds
  X.fillStyle='rgba(255,255,255,.55)';
  for(let i=0;i<5;i++){
    const cx=((i*250-camX*.12)%(W+180))-70;
    const cy=30+(i%3)*32;
    X.beginPath();X.arc(cx,cy,20,0,Math.PI*2);X.arc(cx+16,cy-7,16,0,Math.PI*2);X.arc(cx+32,cy,20,0,Math.PI*2);X.fill();
  }
  // platforms
  for(const p of plats){
    const sx=p.x-camX,sy=p.y-camY;
    if(sx+p.w<-30||sx>W+30)continue;
    X.fillStyle='rgba(0,0,0,.06)';
    X.beginPath();X.ellipse(sx+p.w/2,sy+p.h+3,p.w*.38,4,0,0,Math.PI*2);X.fill();
    X.fillStyle=p.color;X.fillRect(sx,sy,p.w,p.h);
    X.fillStyle='rgba(255,255,255,.3)';X.fillRect(sx+2,sy+1,p.w-4,p.h*.3);
  }
  // player
  const comp=charging?Math.min((Date.now()-chargeStart)/MAX_CHARGE,1):0;
  const pw2=pw*(1+comp*.18),ph2=ph*(1-comp*.32);
  const dx=px+pw/2-pw2/2-camX,dy=py+ph-ph2-camY;
  // shadow
  X.fillStyle='rgba(0,0,0,.1)';X.beginPath();X.ellipse(px+pw/2-camX,py+ph+2-camY,pw2/2,3,0,0,Math.PI*2);X.fill();
  // body
  const g=X.createRadialGradient(dx+pw2/2,dy+ph2*.3,0,dx+pw2/2,dy+ph2*.3,pw2*.5);
  g.addColorStop(0,'#FFB347');g.addColorStop(1,'#FF8C00');
  X.fillStyle=g;X.beginPath();X.roundRect(dx,dy,pw2,ph2,pw2/3);X.fill();
  // eyes
  X.fillStyle='#fff';X.beginPath();X.arc(dx+pw2*.35,dy+ph2*.35,pw2*.15,0,Math.PI*2);X.arc(dx+pw2*.65,dy+ph2*.35,pw2*.15,0,Math.PI*2);X.fill();
  X.fillStyle='#333';X.beginPath();X.arc(dx+pw2*.35,dy+ph2*.35,pw2*.07,0,Math.PI*2);X.arc(dx+pw2*.65,dy+ph2*.35,pw2*.07,0,Math.PI*2);X.fill();
  // charge bar
  if(charging){
    const pct=Math.min((Date.now()-chargeStart)/MAX_CHARGE,1);
    const bw=44,bh=5,bx=W/2-bw/2,by=H-50;
    X.fillStyle='rgba(0,0,0,.18)';X.fillRect(bx,by,bw,bh);
    const bg2=X.createLinearGradient(bx,0,bx+bw,0);bg2.addColorStop(0,'#4ECDC4');bg2.addColorStop(.5,'#FFD93D');bg2.addColorStop(1,'#FF6B6B');
    X.fillStyle=bg2;X.fillRect(bx,by,bw*pct,bh);
  }
}

function update(){
  if(!running)return;
  if(jumping){
    jumpT+=.038;
    if(jumpT>=1){
      jumpT=1;jumping=false;
      // landing check
      let landed=false;
      for(const p of plats){
        if(jumpEX>=p.x&&jumpEX<=p.x+p.w&&jumpEY>=p.y-6&&jumpEY<=p.y+p.h){
          px=jumpEX-pw/2;py=p.y-ph;landed=true;
          if(!p.scored){p.scored=true;score++;document.getElementById('scoreEl').textContent=score;if(score>best){best=score;localStorage.setItem('jb',best)}}
          // new plat
          const last=plats[plats.length-1];addPlat(last.x+60+Math.random()*110,Math.max(H*.28,Math.min(H*.72,last.y+(Math.random()-.5)*90)));
          while(plats.length>12)plats.shift();
          break;
        }
      }
      if(!landed){py+=120;setTimeout(endGame,150)}
    }else{
      const t=jumpT;
      px=jumpSX+(jumpEX-jumpSX)*t;
      py=jumpSY+(jumpEY-jumpSY)*t-jumpArcH*Math.sin(t*Math.PI);
    }
  }
  // camera
  const tcx=px+pw/2-W*.3,tcy=Math.min(0,py+ph/2-H*.55);
  camX+=(tcx-camX)*.08;camY+=(tcy-camY)*.08;
}

function doJump(){
  if(!charging||jumping)return;
  const power=Math.min((Date.now()-chargeStart)/MAX_CHARGE,1);
  const dist=power*170+20;
  // find target
  let tgt=null,bd=Infinity;
  for(const p of plats){
    if(p.x>px){const d=Math.abs(p.x+p.w/2-(px+pw/2+dist));if(d<bd){bd=d;tgt=p}}
  }
  jumpSX=px+pw/2;jumpSY=py;
  if(tgt){jumpEX=tgt.x+tgt.w/2;jumpEY=tgt.y;jumpArcH=55+Math.abs(jumpEX-jumpSX)*.28}
  else{jumpEX=jumpSX+dist;jumpEY=jumpSY+100;jumpArcH=40}
  jumpT=0;jumping=true;charging=false;
}

function endGame(){running=false;document.getElementById('finalScore').textContent=score;document.getElementById('finalBest').textContent='最高纪录：'+best;document.getElementById('gameOver').classList.add('show')}

document.getElementById('startBtn').onclick=()=>{init();running=true;document.getElementById('startScreen').classList.add('hide');document.getElementById('gameOver').classList.remove('show')};
document.getElementById('restartBtn').onclick=()=>{init();running=true;document.getElementById('gameOver').classList.remove('show')};

C.onmousedown=C.ontouchstart=e=>{e&&e.preventDefault();if(running&&!jumping){charging=true;chargeStart=Date.now()}};
C.onmouseup=C.ontouchend=e=>{e&&e.preventDefault();if(running&&charging)doJump()};

function loop(){update();draw();requestAnimationFrame(loop)}
init();draw();loop();
</script>
</body>
</html>
